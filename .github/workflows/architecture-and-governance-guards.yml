name: Architecture And Governance Guards

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: architecture-and-governance-guards-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  architecture-and-governance-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workflow tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Forbid __tests__ directories in source tree
        run: |
          if rg --files app server client components hooks shared | rg '(^|/)__tests__(/|$)'; then
            echo "Found forbidden __tests__ usage in source tree. Place tests under root tests/."
            exit 1
          fi
          echo "OK: no legacy __tests__ usage in source tree."

      - name: Typecheck and architecture guards
        run: |
          pnpm typecheck
          bash .ai-rules/advanced-workflows/guards/check-import-boundaries.sh
          bash .ai-rules/advanced-workflows/guards/check-capability-boundary.sh
          bash .ai-rules/advanced-workflows/guards/check-boundary-exception-todos.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash .ai-rules/advanced-workflows/guards/check-design-token-usage.sh --against "${{ github.event.pull_request.base.sha }}"
            bash .ai-rules/advanced-workflows/guards/check-test-migration.sh --against "${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
              BASE_REF="HEAD~1"
            fi
            bash .ai-rules/advanced-workflows/guards/check-design-token-usage.sh --against "$BASE_REF"
            bash .ai-rules/advanced-workflows/guards/check-test-migration.sh --against "$BASE_REF"
          fi
          bash .ai-rules/advanced-workflows/guards/check-governance-links.sh
